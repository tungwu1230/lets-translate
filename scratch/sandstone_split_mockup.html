<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>open-translate - 書卷極簡精細 Mockup</title>
  <style>
    :root {
      --bg-primary: #fcfbf9;
      --bg-card: #ffffff;
      --border-color: #e6e4de;
      --border-hover: #c4c1b9;
      --text-primary: #262624;
      --text-secondary: #787770;
      --accent-color: #3f6212;
      --accent-hover: #2d460d;
      --accent-glow: rgba(63, 98, 18, 0.05);
      --danger-color: #9f1239;
      --bg-output: #faf9f6;
    }

    * {
      box-sizing: border-box;
      transition: all 0.2s ease;
    }

    body {
      margin: 0;
      padding: 40px 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1060px;
      margin: 0 auto;
    }

    /* Minimal Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding: 0 8px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-mark {
      font-weight: 800;
      font-size: 14px;
      color: var(--accent-color);
      border: 1.5px solid var(--accent-color);
      padding: 4px 8px;
      border-radius: 6px;
      background: var(--accent-glow);
    }

    .brand h1 {
      font-size: 18px;
      font-weight: 700;
      margin: 0;
      letter-spacing: -0.01em;
    }

    .nav-actions {
      display: flex;
      gap: 10px;
    }

    button {
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      border: 1px solid var(--border-color);
      background: var(--bg-card);
      color: var(--text-primary);
      border-radius: 8px;
      padding: 8px 14px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    button:hover {
      background: var(--bg-primary);
      border-color: var(--border-hover);
    }

    .btn-primary {
      background: var(--accent-color);
      color: white;
      border: none;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    /* Sub Toolbar status */
    .toolbar-status {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding: 0 8px;
    }

    .toolbar-status h2 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-secondary);
      margin: 0;
    }

    /* The Main Integrated Card (Split Grid) */
    .translator-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(63, 61, 56, 0.03);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .translator-card:hover {
      border-color: var(--border-hover);
      box-shadow: 0 12px 35px rgba(63, 61, 56, 0.05);
    }

    /* Language select row (Seamless integrated) */
    .lang-selector-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      background: var(--bg-output);
      border-bottom: 1px solid var(--border-color);
      padding: 6px 12px;
    }

    .lang-dropdown {
      appearance: none;
      border: none;
      background: transparent;
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
      padding: 10px 16px;
      cursor: pointer;
      outline: none;
      text-align: center;
      width: 100%;
      text-align-last: center;
    }

    .lang-dropdown:hover {
      color: var(--accent-color);
    }

    .swap-button-circle {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-secondary);
    }

    .swap-button-circle:hover {
      border-color: var(--accent-color);
      color: var(--accent-color);
    }

    /* Editor Split Panels */
    .panel-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 340px;
    }

    .editor-pane {
      padding: 24px;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .editor-pane.input-pane {
      border-right: 1px solid var(--border-color);
    }

    .editor-pane.output-pane {
      background: var(--bg-output);
    }

    .pane-tag {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-secondary);
      margin-bottom: 12px;
      display: block;
    }

    textarea {
      flex: 1;
      border: none;
      background: transparent;
      resize: none;
      outline: none;
      font-size: 15.5px;
      line-height: 1.6;
      color: var(--text-primary);
      padding: 0;
      font-family: inherit;
    }

    textarea::placeholder {
      color: #b3b2ad;
    }

    /* Pane Footer (Inline Actions) */
    .pane-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
      padding-top: 14px;
      border-top: 1px dashed var(--border-color);
    }

    .word-count {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    .action-btn-text {
      border: none;
      background: transparent;
      padding: 6px 10px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .action-btn-text:hover {
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    .action-btn-text.accent {
      color: var(--accent-color);
    }

    .action-btn-text.accent:hover {
      background: var(--accent-glow);
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Navbar -->
    <nav class="navbar">
      <div class="brand">
        <span class="brand-mark">OT</span>
        <h1>open-translate</h1>
      </div>
      <div class="nav-actions">
        <button class="btn-settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
          設定
        </button>
        <button class="btn-primary">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          開啟對照翻譯
        </button>
      </div>
    </nav>

    <!-- Sub Status Bar -->
    <div class="toolbar-status">
      <h2>翻譯工具</h2>
      <div style="font-size: 13px; color: var(--text-secondary);">
        預設模型: <strong style="color: var(--text-primary);">GPT-5.4 Nano</strong>
      </div>
    </div>

    <!-- Translator Card -->
    <div class="translator-card">
      
      <!-- Seamless Integrated Language Row -->
      <div class="lang-selector-row">
        <select class="lang-dropdown">
          <option>英文 (自動偵測)</option>
          <option>繁體中文</option>
          <option>日文</option>
        </select>
        
        <div class="swap-button-circle" title="切換語言">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 11l4-4-4-4M21 7H9M7 21l-4-4 4-4M3 17h12"></path></svg>
        </div>
        
        <select class="lang-dropdown">
          <option>繁體中文</option>
          <option>英文</option>
          <option>日文</option>
        </select>
      </div>

      <!-- Editors Split Area -->
      <div class="panel-split">
        
        <!-- Left Pane: Input -->
        <div class="editor-pane input-pane">
          <span class="pane-tag">原文</span>
          <textarea placeholder="貼上或輸入要翻譯的內容..."></textarea>
          
          <div class="pane-footer">
            <span class="word-count">0 字</span>
            <div class="actions">
              <button class="action-btn-text">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20H4M4 4v16M18 4v12a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V4M10 4h4"></path></svg>
                清空
              </button>
            </div>
          </div>
        </div>

        <!-- Right Pane: Output -->
        <div class="editor-pane output-pane">
          <span class="pane-tag">譯文</span>
          <textarea placeholder="翻譯結果會出現在這裡..." readonly></textarea>
          
          <div class="pane-footer">
            <span class="word-count" style="color: var(--accent-color); font-weight: 600;">已就緒</span>
            <div class="actions">
              <button class="action-btn-text">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                複製譯文
              </button>
              <button class="action-btn-text accent">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                翻譯
              </button>
            </div>
          </div>
        </div>

      </div>

    </div>

  </div>
</body>
</html>
